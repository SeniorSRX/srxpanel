# Reverse proxy for the SRXPanel container.
# Certbot writes challenges to /var/www/certbot and certificates to
# /etc/letsencrypt (both shared volumes). After the first successful issue,
# uncomment the HTTPS server block and reload nginx.

upstream srxpanel_app {
    server srxpanel:5000;
}

server {
    listen 80;
    server_name _;

    # ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location ~* (\.env|\.git|wp-login\.php|xmlrpc\.php)$ { return 403; }

    location / {
        proxy_pass http://srxpanel_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }
}

